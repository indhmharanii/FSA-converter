<!DOCTYPE html>
<html>
<head>
  <title>FSA Converter</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #3e2c23, #a67c52);
    margin: 0;
    padding: 0;
    color: #fffaf5;
  }

  h1 {
    text-align: center;
    margin-top: 20px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
  }

  .card {
    background: rgba(255, 250, 245, 0.2);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 20px;
    margin: 20px 0;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.2);
    animation: fadeIn 0.8s ease;
  }

  textarea {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    border: none;
    padding: 12px;
    font-size: 14px;
    background: rgba(255,255,255,0.9);
    outline: none;
    color: #3e2c23;
  }

  input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    width: 150px;
    background: rgba(255,255,255,0.9);
    outline: none;
    color: #3e2c23;
  }

  .label {
    display: block;
    margin-top: 10px;
    font-weight: 600;
  }

  button {
    background: linear-gradient(135deg, #8b5e3c, #5a3e2b);
    border: none;
    padding: 12px 22px;
    margin: 10px;
    color: #fffaf5;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  button:hover {
    transform: translateY(-3px) scale(1.05);
    background: linear-gradient(135deg, #6f4e37, #3e2c23);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  #network {
    width: 100%;
    height: 400px;
    border-radius: 15px;
    background: rgba(255,255,255,0.8);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: rgba(255,255,255,0.95);
    border-radius: 10px;
    overflow: hidden;
    color: #3e2c23;
  }

  th {
    background: #6f4e37;
    color: #fffaf5;
  }

  td, th {
    border: 1px solid #e0d3c2;
    padding: 10px;
    text-align: center;
  }

  tr:nth-child(even) {
    background: #f5ede6;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
  }
</style>

</head>

<body>

<h1>FSA Converter</h1>

<div class="container">

  <!-- INPUT -->
  <div class="card">
    <h3>✏️ Input Transisi</h3>
    <p>Format: <b>state,input,state</b></p>

    <textarea id="input" placeholder="Contoh:
q0,a,q1
q0,b,q2"></textarea>

    <span class="label">Start State:</span>
    <input type="text" id="start" value="q0">

    <span class="label">Final State (pisahkan koma):</span>
    <input type="text" id="final" value="q0">

    <br>
    <button onclick="generateDiagram()">🎯 Tampilkan Diagram</button>
    <button onclick="generateTable()">📊 Tampilkan Tabel</button>
  </div>

  <!-- GRID -->
  <div class="grid">
    <div class="card">
      <h3>Diagram</h3>
      <div id="network"></div>
    </div>

    <div class="card">
      <h3>Tabel Transisi</h3>
      <div id="output"></div>
    </div>
  </div>

</div>

<script>

// =====================
// TAMPILKAN DIAGRAM
// =====================
function generateDiagram() {
  let edges = [];
  let nodes = {};

  let input = document.getElementById("input").value.split("\n");
  let start = document.getElementById("start").value;
  let finals = document.getElementById("final").value.split(",");

  input.forEach(line => {
    let [from, label, to] = line.split(",");
    if (!from || !to) return;

    nodes[from] = true;
    nodes[to] = true;

    edges.push({
      from: from,
      to: to,
      label: label,
      arrows: "to"
    });
  });

  let nodeArray = Object.keys(nodes).map(n => ({
    id: n,
    label: n,
    shape: finals.includes(n) ? "doubleCircle" : "circle",
    color: n === start ? "#d4a373" : "#b08968"
  }));

  let container = document.getElementById("network");
  let data = {
    nodes: new vis.DataSet(nodeArray),
    edges: new vis.DataSet(edges)
  };

  let options = {
    edges: { smooth: true },
    physics: { enabled: true }
  };

  new vis.Network(container, data, options);
}

// =====================
// TAMPILKAN TABEL
// =====================
function generateTable() {
  let lines = document.getElementById("input").value.trim().split("\n");

  let states = new Set();
  let inputs = new Set();
  let table = {};

  lines.forEach(line => {
    let [from, symbol, to] = line.split(",");
    if (!from || !symbol || !to) return;

    states.add(from);
    states.add(to);
    inputs.add(symbol);

    if (!table[from]) table[from] = {};
    table[from][symbol] = to;
  });

  states = Array.from(states);
  inputs = Array.from(inputs);

  let html = "<table><tr><th>δ</th>";
  inputs.forEach(i => html += "<th>" + i + "</th>");
  html += "</tr>";

  states.forEach(s => {
    html += "<tr><td>" + s + "</td>";
    inputs.forEach(i => {
      html += "<td>" + (table[s]?.[i] || "-") + "</td>";
    });
    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
